<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료형 - 참조 타입</title>
    <script>
        /*
            [참조 타입]
            값의 주소(참조)를 저장하며, 여러 값 묶어 관리가능

            Object: 키와 값의 쌍으로 이뤄진 객체
                let user = {name:"김사과", age:20}
            Array: 여러 값을 순서대로 저장
                let scores = [90, 80, 70]
            Function: 실행 가능한 코드 블록
                1) function hello() { console.log("안녕하세요") }
                2) let hello = function() { console.log("안녕하세요") }


            [원시 타입의 저장 방식] 
            - 값 그 자체가 변수에 직접 저장
            - 숫자나 문자열을 변수에 넣으면, 그 변수 안에 실제 값이 들어감
            - 다른 변수에 복사하면 완전히 새로운 값이 복사됨, 한쪽을 변경하더라도 다른쪽에 영향주지 않음(4번파일 참고)

            [참조 타입의 저장 방식]
            - 값이 저장된 위치(주소)를 변수에 저장하는 형태(파이썬의 형태)
            - 객체나 배열을 변수에 담으면, 변수엔 실제 데이터가 아닌 데이터가 있는 곳의 주소가 들어감
            - 다른 변수에 할당하면 같은 데이터를 가리킴, 한쪽을 변경하면 다른쪽애 영향 줌


            [스택 vs 힙]
            스택(Stack)
                - 프로그램 실행 중 함수 호출과 지역변수, 매개변수같은 임시 데이터가 저장되는 메모리 공간
                - 코드가 실행되는 순서대로 쌓였다가 함수가 종료되면 자동으로 제거되는 후입선출 구조를 가진다.
                - 관리가 단순하고 접근 속도가 빠르다는 장점이있다.
            힙(Heap)
                - 객체, 배열처럼 크기가 유동적이거나 오래 유지되어야 하는 데이터가 저장되는 메모리 공간
                - 프로그램 실행 중 필요할때 할당, 더이상 사용도지 않으면 가비지 컬렉터에 의해 정리
                - 스택보다 관리가 복좁하지만 큰 데이터와 공유데이터 다루기 적합
        */
    </script>
</head>
<body>
    <h1>참조 타입 예제</h1>
    <script>
        // 객체
        const user = {name:"김사과", age:20}
        console.log("user 객체: ", user)
        console.log("user 객체 타입 : ", typeof user)

        // 배열
        const scores = [90, 80, 100, 60]
        console.log("scores 배열: ", scores)
        console.log("scores 배열 타입 : ", typeof scores)

        // 함수
        function greet() {
            console.log("안녕하세요")
        }
        console.log("greet 함수: ", greet)
        console.log("greet 함수 타입 : ", typeof greet)

        // 참조 타입의 특징
        const copyUser = user
        copyUser.age = 25 // 내부 접근가능(객체니까)
        console.log("원본 user : ", user)
        console.log("복사본 copyUser : ", copyUser)


    </script>
</body>
</html>
