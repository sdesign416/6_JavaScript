<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM</title>
    <script>
        /*
            [BOM - Browser Object Model]
            - 자바스크립트가 브라우저 자체를 제어하고 정보를 얻기위해 사용하는 객체 모델

            [API - Application Programming Interface]
            - 서로 다른 프로그램이나 시스템이 데이터를 주고받고 기능을 사용할 수 있도록 연결해주는 중간 통로


            1. window 객체
            - 자바스크립트에서 브라우저 창을 대표하는 최상위 객체
            - 전역 범위에서 정의된 변수나 함수, 타이머, 팝업, 브라우저 정보 등 대부분의 기능을 포함하고 있음
            - HTML 페이지를 로드하면 브라우저는 자동으로 Window객체 생성
            - 자바스크림트 코드에서 명시적으로 window를 쓰지 않아도 사용가능

            2. location 객체
            - 자바스크립트에서 현재 웹 페이지의 URL(주소) 정보를 다루고 제어할 수 있게 해주는 window 객체의 하위 객체

            3. history 객체
            - 브라우저의 방문 기록을 제어할 수 있는 객체
            - 사용자가 이전에 방문했던 페이지로 이동하거나 앞으로 다시 이동할 수 있는 기능을 제공

            4. navigator 객체
            - 브라우저에 대한 정보를 제공하는 객체
            - 사용자의 브라우저 종류, 버전, 운영체제, 언어설정, 온라인 여부 등 다양한 환경 정보를 확인할 수 있도록 해줌
            - geolocation: 사용자의 위치 정보를 가져오기 위한 API로, GPS, WIFI, IP 주소 등을 이용해 현재 위치를 알아냄. 사용자의 명시적인 동의가 있어야 작동가능

            5. 

        */
    </script>
</head>
<body>
    <button onclick="reloadPage()">페이지 새로고침</button>
    <button onclick="goToNaver()">네이버 바로가기</button>
    <button onclick="showLocationInfo()">주소정보 보기</button>

    <hr>

    <button onclick="goBack()">뒤로 가기</button>
    <button onclick="goForward()">앞으로 가기</button>
    <button onclick="showHistoryLength()">방문 기록 횟수</button>

    <hr>

    <button onclick="showNavigatorInfo()">브라우저 정보 보기</button>

    <hr>

    <p id="locationInfo">위치정보가 여기에 표시됩니다.</p>
    <button onclick="getlocation()">위치 가져오기</button>

    <script>
        function showWindowInfo(){
            // 객체가 따로 있음
            console.log("브라우저 이름: ", window.navigator.appName)
            console.log("브라우저 엔진: ", window.navigator.product)
            console.log("사용자 에이전트: ", window.navigator.userAgent)

            console.log("현재 페이지 URL: ", window.location.href)

            // window안에 바로 있는 변수
            console.log("현재 창 너비: ", window.innerWidth)
            console.log("현재 창 높이: ", window.innerHeight)

            // window 안에 바로 있는 타이머 함수 (일정 시간 후 실행)
            window.setTimeout(function() {
                window.alert("3초가 지났습니다")
            }, 3000) //3초 지나면 익명함수 호출

            window.setTimeout(function() {
                // window 생략가능
                alert("3초가 지났습니다")
            }, 3000)
        }
        // showWindowInfo()

        function showLocationInfo(){
            console.log("전체 URL: ", location.href)
            console.log("프로토콜: ", location.protocol)
            console.log("호스트: ", location.host)
            console.log("호스트명: ", location.hostname)
            console.log("포트번호: ", location.port)
            console.log("경로: ", location.pathname)
            console.log("쿼리 문자열: ", location.search)
            // 주소창뒤에 ?하고 입력하면 쿼리 문자열에 값 추가됨
            // http://127.0.0.1:5500/15_BOM.html?userid=apple
        }
        // showLocationInfo()


        // 함수 자체는 호이스팅이 되기때문에 html아래 script써도 호출됨
        function reloadPage(){
            location.reload()
        }

        // location.href에 값 세팅 가능
        function goToNaver(){
            location.href = "https://www.naver.com"
        }

        // history 객체
        function goBack(){
            history.back()
        }
        function goForward(){
            history.forward
        }
        function showHistoryLength(){
            alert("방문 기록 수: " + history.length)
        }

        // navigator 객체
        function showNavigatorInfo(){
            console.log("브라우저 이름(userAgent): ", navigator.userAgent)
            console.log("운영체제: ", navigator.platform)
            console.log("언어설정: ", navigator.language)
            console.log("쿠키 사용가능 여부: ", navigator.cookieEnabled)
        }

        // navigator 객체 - geolocation
        function getlocation(){
            // 네비게이터에 geolocation 있는지 확인
            if(navigator.geolocation){
                // 있다면: 위험도, 에러객체 둘 중 하나 가져와
                navigator.geolocation.getCurrentPosition(showPosition, showError)
            }else{
                // 없다면: 
                // document = 브라우저 body관리
                // getElementById = id 찾아줘
                // 해당 id에 Text값 넣어줘
                document.getElementById("locationInfo").innerText = "이 브라우저는 위치 정보를 지원하지 않습니다."
            }
        }
        // 콜백으로 만들기
        function showPosition(position){
            const latitude = position.coords.latitude   // 위도
            const longitude = position.coords.longitude // 경도
            document.getElementById("locationInfo").innerText = `위도:$(latitude), 경도:${longitude}`
        }
        function showError(error){
            switch(error.code){
                case error.PERMISSION_DENIED:
                    alert("사용자가 위치 정보 제공을 거부했습니다")
                    break
                case error.POSITION_UNAVAIVABLE:
                    alert("위치 정보를 사용할 수 없습니다")
                    break
                case error.TIMEOUT:
                    alert("위치 정보를 가져오는 데 시간이 초과되었습니다")
                    break
                default:
                    alert("알 수 없는 오류가 발생했습니다")
            }
        }
    </script>
    
</body>
</html>
