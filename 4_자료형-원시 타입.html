<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료형 - 원시 타입</title>
    <script>
        /*
            [원시 타입]
            원시 타입은 하나의 값만 저장하며, 값 자체가 변수에 직접 저장된다. (파이썬과 다름)
            - Number: 숫자형 데이터(정수, 실수, 음수, 양수 모두 포함)
                let age = 20
                let price = 3.14
            - String: 문자열 데이터(큰따옴표"", 작은따옴표'', 백틱`` > 백틱 자주 씀)
                let name = "김사과" //리터럴로 저장
                let name = String("김사과") //객체를 통해 저장
            - Boolean: 참(true)/거짓(flase) 저장(파이썬과 다르게 모두 소문자)
                let idLogin = true
            - Undefined: 값이 할당되지 않은 상태. 변수를 선언했지만 값을 할당하지 않았을 때 자동으로 undefined
                let value
            - null: 의도적으로 값이 없음을 표현
                let data = null
            - Bigint: 매우 큰 정수 표현. 일반 number로 표현할 수 없는 큰 정수를 다룰 때 사용
                let bigNum = 1234567890123456789n;
                Number.MAX_SAFE_INTEGER
        */
        
        // 이렇게 해서 나온 값 보다 큰 값을 쓸 때 빅인트 사용!
        console.log(Number.MAX_SAFE_INTEGER)
    </script>
</head>
<body>
    <h1>원시 타입 예제</h1>
    <script>
        let age = 20
        let name = '김사과'
        let isStudent = true
        let result
        let data = null

        // 파이썬에선 아래처럼 주면 age도 값이 바껴야하는데 자바스크립트는 각각의 값을 가짐 → 값을 직접 담기 때문에!
        let age2 = age
        age2 = 25
        console.log("age: ", age2, typeof(age2))

        console.log("age: ", age, typeof(age))
        console.log("age: ", age, typeof age) //이렇게 되는 키워드들이 있음(모두 다 되는건 아님)

        console.log("name: ", name, typeof(name))
        console.log("isStudent: ", isStudent, typeof(isStudent))
        console.log("result: ", result, typeof(result))
        console.log("data: ", data, typeof(data))
    </script>
</body>
</html>
