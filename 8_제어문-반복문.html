<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제어문-반복문</title>
    <script>
        /*
            [while 문]
            while(조건식){
                조건식이 true일 동안 실행될 코드
            } // 애초에 조건식이 false면 실행되는게 아예 없음
            
            [do while 문]
            do { // 애초에 조건식이 false여도 한 번은 실행됨
                반복 실행할 코드
            }while(조건식)

            [for 문]
            for(초기식; 조건식; 증감식){
                조건식이 true일 동안 반복 실행할 코드
            }
        */
    </script>
</head>
<body>
    <h1>while 문</h1>
    <script>
        let dan = 7
        let i = 1

        while(i <= 9){
            console.log(`${dan} x ${i} = ${dan * i}`)
            i++
        }
    </script>

    <hr>
    <h1>Do ~ while 문</h1>
    <script>
        let num = 10 // 조건에 맞지 않지만 한 번은 찍힘
        do {
            console.log(`현재 num: ${num}`)
            num++
        }while(num <= 9)
    </script>

    <hr>
    <h1>for 문</h1>
    <script>
        /*
        let i =1
        while(i<=5){
            console.log(`현재 i의 값: ${i}`)
            i++
        }
        → 변수가 이곳저곳 퍼져있는데 for문으로 합쳐서 가독성높이고 쉽게 사용
        */

        for(let i=1; i<=5; i++){
            console.log(`현재 i의 값: ${i}`)
        }
    </script>

    <hr>
    <h1>중첩 for문 구구단</h1>
    <script>
        /*
        중첩 적용 X
        for(let dan=2; dan<=9; dan++){
            console.log(`${dan} x ${1} = ${dan * 1}`)
        }
        */

        for(let dan=2; dan<=9; dan++){
            for(let i=1; i<=9; i++){
                 console.log(`${dan} x ${i} = ${dan * i}`)
            }
        }
    </script>

    <hr>
    <h1>break 문</h1>
    <script>
        console.log("[break 문]")
        for(let i=1; i<=10; i++){
            if(i > 5) break
            console.log(`i의 값: ${i}`)
        }
    </script>

    <hr>
    <h1>continue 문</h1>
    <script>
        console.log("[continue 문]")
        for(let i=1; i<=20; i++){
            if(i % 3 == 0) {
                continue
            }
            console.log(`i의 값: ${i}`)
        }
    </script>
    
</body>
</html>
