<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정규식</title>
    <script>
        /*
            [정규식]
            문자열에서 특정한 패턴을 찾거나, 검사하거나, 치환하기 위해 사용하는 표현

            /패턴/옵션
            or
            new RegExp("패턴", "옵션")
            :: 패턴에서 +를 붙이는것은 반복을 해야할때만 사용한다!


            [패턴]
            a: 문자 a. abc(문자열 abc)
            .: 아무 문자 1개
            [abc]: a또는 b또는 c
            [a-z]: a부터 z, [가-힣] 한글, [0-9] 숫자, [^0-9] 숫자가 아닌 문자
            *: 0번 이상
            +: 1번 이상
            ?: 0 또는 1
            {n}: 정확히 n번
            {n,}: n번 이상
            {n,m}: n~m번
            ^: 문자열 시작
            $: 문자열 끝
            \d: 숫자
            \D: 숫자 아님
            \w: 문자 또는 숫자 또는 _
            \W: 문자 또는 숫자 또는 _ 외 문자
            \s: 공백
            \S: 공백 아닌 문자
            g: 전체 검색
            i: 대소문자 무시
            m: 여러 줄 처리


            [정규식 관련 메서드]
            test(): 패턴 존재 여부
                const reg = /^[0-9]+$/ → 숫자로 시작하고 1글자 이상이면서 숫자로 끝나야함.
                reg.test("a123") // false
                reg.test("1234") // true
            match(): 일치 결과 반환
                "abc123".match(/\d+/) // ["123"] → 숫자면서 여러글자(가능)
            replace(): 치환
                "010-1234-5678".replace(/-/g, "") // 01012345678 → -을 전체검색 후 삭제
            search(): 위치 반환
                "hello".search(/e/) // 1 → e가 위치한 자리인 1 반환
        */
    </script>
</head>
<body>
    <button id="checkBtn">검사하기</button>
    <script>
        document.getElementById("checkBtn").addEventListener("click", function() {
            // 이메일 검사
            const email = "apple@apple.com"
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/ 
            // [문자열 시작 공백, @ 아닌 문자], 여러글자, @무조건 포함, [문자열 시작 공백, @ 아닌 문자], 여러글자, . 무조건 포함, [문자열 시작 공백, @ 아닌 문자]
            console.log("이메일 검사: ", emailRegex.test(email))

            // 휴대폰 검사
            const phone = "010-1234-5678"
            const phoneRegex = /^010-\d{3,4}-\d{4}$/
            console.log("휴대폰번호 검사: ", phoneRegex.test(phone))

        })
    </script>
    
</body>
</html>
