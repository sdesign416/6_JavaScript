<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <script>
        /*
            [DOM - Document Object Model]
            - HTML 문서를 트리 구조의 객체로 표현한 것
            - 자바스크립트를 통해 웹 페이지의 요소를 선택하고 내용이나 스타일을 변경
            - 요소를 추가.삭제하는 등 동적인 화면 조작을 가능하게 해주는 인터페이스

            [DOM 작동원리]
            1. 브라우저가 HTML파일을 읽음
            2. HTML 태그를 하나하나 분석하여 트리구조의 객체를 생성
            3. 각 태그는 노드라는 객체가 됨
            4. 자바스크립트는 DOM 객체를 통해 화면을 제어

            [Document 객체]
            - 웹 페이지의 전체를 표현하는 최상위 DOM객체
            - HTML문서에 직접 접근하고 조작할 수 있는 핵심 객체
            - 브라우저가 HTML 파일을 로드하면 자동으로 Document 객체가 생성
            - 이 객체를 통해 웹 페이지의 요소들을 선택, 생성, 수정, 삭제 할 수 있음

        */
    </script>
</head>
<body>
    <p id="greeting">안녕하세요</p>
    <button onclick="changeText()">텍스트 바꾸기</button>

    <hr>

    <p class="item">아이템 1</p>
    <p class="item">아이템 2</p>
    <button onclick="highlightItems()">강조</button>

    <hr>

    <p class="desc">1번째 문장</p>
    <p class="desc">2번째 문장</p>
    <button onclick="updateFirst()">1번째 문장만 바꾸기</button>
    <button onclick="updateDesc()">1/2번째 문장 바꾸기</button>

    <hr>

    <!-- ul#list>li{기존 항목} Tab -->
    <ul id="list">
        <li>기존 항목1</li>
        <li>기존 항목2</li>
    </ul>
    <button onclick="addItem()">항목 추가</button>
    <button onclick="removeItem()">항목 삭제</button>
    <button onclick="insertItem()">항목 맨 앞에 추가</button>
    <!-- <div id="box">뒤에 전체 노드 복제됨 -->
    <button onclick="copyChild()">노드 복제</button> 
    
    <hr>

    <p><img id="image" src="./images/spring1.png" alt="봄1"></p>
    <button onclick="changeImage()">이미지 변경</button>

    <hr>

    <p id="notice">이 문장은 곧 사라집니다</p>
    <button onclick="removeText()">삭제</button>

    <hr>

    <div id="box"></div>
    <button onclick="appendP()">새 문단 추가</button>
  
    <hr>



    <script>
        // [글자 변경]
        function changeText(){
            // .getElementById : 아이디 찾아줘 (단수임!)
            // .innerText = : = 뒤의 글자로 바꿔줘
            document.getElementById("greeting").innerText = "방가"
        }

        // [강조하기]
        function highlightItems(){
            // Elements → 복수임!!
            const items = document.getElementsByClassName("item")
            for (let i = 0; i < items.length; i++){
                items[i].style.color = "red"
            }
        }

        // [첫번째 문장만 바꿈]
        function updateFirst(){
            // querySelector: 단수를 찾는것
            // class desc 하나만 찾음: 첫번째것
            const item = document.querySelector(".desc")
            // innerHTML: 글자도 쓰고 태그도 쓸 수 있음
            // innerText: 텍스트만 가능
            item.innerHTML = "<h1>바뀐 문장</h1>"
        }

        // [문장 모두 바꿈]
        function updateDesc(){
            // class desc 모두 찾아서 배열로 저장
            const items = document.querySelectorAll(".desc")
            for(let i = 0; i<items.length; i++){
                items[i].innerHTML = "<h3>바뀐 문장</h3>"
            } 
        }

        // [항목 추가]
        function addItem(){
            // createElement: 태그를 만드는것
            const newItem = document.createElement("li") // <li></li>
            newItem.innerText = "새 항목" // <li>새 항목</li>
            // getElementById: id값 찾아줘
            // appendChild: 젤 끝에 괄호에걸 추가해줘
            document.getElementById("list").appendChild(newItem)
        }

        // [항목 삭제]
        function removeItem(){
            const ul = document.getElementById("list")
            // 위에서부터 삭제됨
            const li = document.querySelector("li")
            ul.removeChild(li)
        }

        // [항목 맨 앞에 추가]
        function insertItem(){
            const ul = document.getElementById("list")
            const newItem = document.createElement("li")
            newItem.innerText = "사과"
            // ul.firstElementChild: ul의 첫번째 자식을 가져와라
            const firstItem = ul.firstElementChild
            ul.insertBefore(newItem, firstItem)
        }

        // [노드 복제]
        function copyChild(){
            const original = document.getElementById("list")
            // 리스트에 있는 자식들까지 다 복사(false는 얕은 복사: 1차 자식만)
            const clone = original.cloneNode(true) // 깊은 목사: 모든 자식
            document.body.appendChild(clone)
        }

        // [이미지 변경]
        function changeImage(){
            // setAttribute: ~속성을 ~로 바꾸겠다
            document.getElementById("image").setAttribute("src", "./images/spring2.png")
        }

        // [문장 삭제]
        function removeText(){
            document.getElementById("notice").remove()
        }

        // [새 문단 추가]
        function appendP(){
            const div = document.getElementById("box")
            const p = document.createElement("p")
            p.innerText = "새 문단 추가!"
            div.appendChild(p)
        }
    </script>
</body>
</html>
