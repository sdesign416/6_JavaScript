<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스코프</title>
    <script>
        /*
            [스코프의 종류]

            1. 전역 스코프
                - 어느 곳에서든 접근 가능한 최상위 범위
                - 브라우저 환경에선 전역에서 var로 선언한 변수는 보통 window의 프로퍼티가 되지만 let/const는 전역에 선언해도 전역 객체 프로퍼티로 붙지 않는 차이가 있음
                var a =1    // window.a = 1
                let b = 2   // window.b X사용불가X

            2. 함수 스코프
                - 함수 내부에서 선언된 변수
                - var는 블록의 중괄호를 무시하고 함수 단위로만 스코프가 결정되는 함수 스코프를 가짐
                - var를 블록 안에서 선언해도 함수 밖에서 접근 가능한 경우가 많아 버그의 원인이 될 수 있음
                function test(){
                    if(true){
                        var x = 10
                        console.log(x)  // 원래는 이렇게만 가능
                    }
                    console.log(x) // 블록 밖에서도 접근가능(규칙이 맞지 않아 앵간해선 안쓰는게 좋음) 
                }

            3. 블록 스코프
                - {}(블록) 단위로 범위가 결정되는 스코프
                - let과 const는 블록 스코프를 가지므로 if, for, while, try/catch 등의 블록 안에서 선언하면 그 블록 밖에선 접근할 수 없음
                if(true){
                    let y =20
                    const z = 30
                }
                console.log(y)  // error
                console.log(z)  // error

            4. 지역 스코프
                - 보통 전역이 아닌 모든 스코프(함수, 블록)를 통칭하는 말
                function outer(){
                    const local = "지역변수"
                    console.log(local)  // ok
                }
                console.log(local)      // error

            5. 렉시컬 스코프(정적 스코프)
                - 함수가 어디에서 호출되었는지가 아닌, 어디에 선언되었는지에 따라 상위 스코프가 결정됨
                - 내부 함수는 자신이 선언된 위치 기준으로 바깥 변수에 접근할 수 있음
                const x = "전역";       // [1] 전역 변수 x 선언

                function outer() {      // [2] outer 함수 정의
                    const x = "outer";  // [5] outer 지역 변수 x 선언
                    function inner(){   // [6] inner 함수 정의
                        console.log(x); // [8] "outer" 출력! :inner가 선언된 곳 기준으로 바깥을 찾으므로 [5]번 x를 참조
                    }
                    inner();            // [7] inner 함수 호출
                }
                outer();                // [3] outer 함수 호출 -> [4] outer 함수 내부로 진입

                스코프 체인
                    - 변수를 찾을 때 자바스크립트는 현재 스코프 → 상위 스코프 → ... → 전역 스코프 순서로 올라가며 검색
                    - 이 연결 구조를 스코프 체인이라고 함
        */
    </script>
</head>
<body>

    <script>

        console.log("[전역 스코프]")

        var a = 1
        let b = 2
        const c = 3

        function func1(){
            console.log(a, b, c) // 모두 접근 가능
        }

        func1() // 1 2 3
        console.log(window.a) // 1
        console.log(window.b) // undefined
        console.log(window.c) // undefined


        // ------------------------------------------------------------------
        console.log("[레벨 스코프]")

        function func2(){
            if(true){
                var x = 10
                let y = 20
            }
            console.log(x) // 10 : 혼동이 일어나 10이 출력되는것임
            //console.log(y) // error : let으로 작성되어있어 밖에서 선언하면 error남
        }
        func2()

        // ------------------------------------------------------------------
        console.log("[렉시컬 스코프]")

        function func3(){
            const x = "outer"
            function inner(){
                console.log(x)
            }
            inner()
        }
        func3() // outer
    </script>
    
</body>
</html>
