<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연산자</title>
    <script>
        /*
            [연산자]

            1. 산술 연산자
                +, -, *, /, %, **
                
            2. 대입 연산자
                =, +=, -=, *=, /=, %=

            3. 비교 연산자
                ==, !=, >, <, >=, <=

                == : 값만 비교
                === : 값 + 타입까지 비교
                != : 값만 비교
                !== : 값 또는 타입 비교(잘 안씀)

                10 == "10" → true
                10 === "10" → false
                10 != "10" → false
                10 !== "10" → true, !(a === b)

            4. 논리 연산자
                && : AND
                || : OR
                ! : NOT

            5. 증감 연산자 (변수의 앞에 붙냐, 뒤에 붙냐에 따라 달라짐)
                ++ : 값을 1 증가
                -- : 값을 1 감소

            6. 문자열 연산자
                + : 문자열 연결할 때 사용

            7. 조건(삼항) 연산자
                조건에 따라 다른 값을 선택
                조건 ? 값1 : 값2
                >> 조건이 true면 값1, false면 값2

            8. 타입 관련 연산자
                typeof : 변수의 타입을 반환
                instanceof : 변수가 특정 객체의 타입인지 확인

            9. 기타 연산자
                , : 여러 표현식 나열
                ?. : 옵셔널 체이닝(null인지 아닌지 체크)
                ?? : null 병합 연산자(null일 경우 특정값을 반환)
        */
    </script>
</head>
<body>
    <script>
        // 비교 연산자
        console.log(5 == "5")   // true
        console.log(5 === "5")  // false

        // 증감 연산자
        let count = 1
        count++
        console.log(count)  // count: 2
        count--
        console.log(count)  // count: 1
        let result = ++count
        console.log(result) // result: 2
        console.log(count)  // count: 2
        result = count++
        console.log(result) // result: 2
        console.log(count)  // count: 3
        // → why???
        // 전치 : 선 증가 후 대입(1 더한 후 그 결과를 변수에 할당)
        // 후치 : 선 대입 후 증가(현재 값을 변수에 할당 후 1 더함)

        // 조건(삼항) 연산자
        let score = 85
        result = score >= 60 ? "합격" : "불합격"
        console.log(result)

        // 타입 관련 연산자
        let num = 10
        let arr = [] // (let arr = Array()와 같음)
        console.log(typeof num) // number
        console.log(arr instanceof Array) // true

        // 기타 연산자
        let x = (1, 2, 3, 10)
        console.log(x) // 10 → 마지막 값인 10 찍힘
        let user = null
        // console.log(user.name) → 에러남
        console.log(user?.name) // undefined
        let value = "안녕" // null
        let resultValue = value + "기본값"
        console.log(resultValue) // 안녕기본값
        let resultValue2 = value ?? "기본값"
        console.log(resultValue2) // 기본값
        // → let value = "안녕" 이란식으로 값을 넣으면 해당 값이 출력
        
    </script>
    
</body>
</html>
